name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: latest

  go-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run tests
        run: go test ./... -race -coverprofile=coverage.out
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: error
          retention-days: 7

  go-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: go build ./cmd/ccw

  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.2
      - name: Run shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck bin/ccw

  shfmt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Install shfmt
        run: |
          go install mvdan.cc/sh/v3/cmd/shfmt@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
      - name: Check formatting
        run: shfmt -d -i 2 -ci bin/ccw

  bats:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.2
      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats
      - name: Configure git identity
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "ci"
      - name: Run bats
        run: bats tests/

  workflow-result:
    needs: [go-lint, go-test, go-build, shellcheck, shfmt, bats]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check workflow result
        run: |
          if [ "${{ needs.go-lint.result }}" != "success" ]; then
            echo "go-lint failed: ${{ needs.go-lint.result }}"
            exit 1
          fi
          if [ "${{ needs.go-test.result }}" != "success" ]; then
            echo "go-test failed: ${{ needs.go-test.result }}"
            exit 1
          fi
          if [ "${{ needs.go-build.result }}" != "success" ]; then
            echo "go-build failed: ${{ needs.go-build.result }}"
            exit 1
          fi
          if [ "${{ needs.shellcheck.result }}" != "success" ]; then
            echo "shellcheck failed: ${{ needs.shellcheck.result }}"
            exit 1
          fi
          if [ "${{ needs.shfmt.result }}" != "success" ]; then
            echo "shfmt failed: ${{ needs.shfmt.result }}"
            exit 1
          fi
          if [ "${{ needs.bats.result }}" != "success" ]; then
            echo "bats failed: ${{ needs.bats.result }}"
            exit 1
          fi
          echo "All jobs completed successfully"
