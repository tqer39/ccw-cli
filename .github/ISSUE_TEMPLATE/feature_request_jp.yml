---
name: "Feature Request (jp)"
description: "新機能・改善提案"
labels: ["enhancement"]
body:
  - type: "textarea"
    id: "description"
    attributes:
      label: "概要"
      description: "ccw にどんな機能を入れたいか、1〜2 文で。"
    validations:
      required: true

  - type: "textarea"
    id: "motivation"
    attributes:
      label: "背景・動機"
      description: "解決したい課題やユースケース。"
    validations:
      required: true

  - type: "textarea"
    id: "alternatives"
    attributes:
      label: "代替案"
      description: "検討した回避策や別アプローチ。"
