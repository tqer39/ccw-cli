version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gocritic
    - revive
    - errorlint
    - wrapcheck
    - gocyclo
  settings:
    gocyclo:
      min-complexity: 15
    wrapcheck:
      ignore-sigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - errors.Join(
        - .Wrap(
        - .Wrapf(
        - .WithMessage(
        - .WithMessagef(
        - .WithStack(
        - os/exec.Command
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - wrapcheck
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
